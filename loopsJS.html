<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Loops in JS</title>
    </head>
    <body>
        <script>
            //loops:used to repeatdly execute a block of code until a specified condition is true.
            //for loop:used when you know the number of iterations in advance.
            let studentList=["Apoorva Saini", "Anshul", "Anshika", "Aman", "Ankit"];
            for(let i=0; i<studentList.length; i++){
                console.log(studentList[i]);
            }
            //while loop........
            let x=0;
            while(x<studentList.length){
                console.log(studentList[x]);
                x++;
            }
            // for ....of:Iterates over the values of an iterable object such as an array or a string.
            for(let y of studentList){
                console.log(y);
            }
        </script>
        </body>
        </html>
